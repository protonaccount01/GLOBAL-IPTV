<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Country-Wise IPTV Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        /* কাস্টম স্ক্রোলবার ডিজাইন */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-4">
            <h1 class="text-2xl font-bold text-emerald-400">🌍 Mega Global IPTV Player</h1>
            <div class="relative aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border border-slate-800">
                <video id="videoPlayer" class="w-full h-full" controls autoplay></video>
            </div>
            <h2 id="nowPlaying" class="text-xl font-semibold text-slate-300">Select a channel to play...</h2>
        </div>

        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex flex-col h-[85vh]">
            
            <label class="text-xs text-slate-400 font-bold uppercase mb-1">Select Country / Region:</label>
            <select id="countrySelect" class="w-full p-2.5 mb-3 bg-slate-800 border border-slate-700 rounded-lg text-white focus:outline-none focus:border-emerald-500">
                <option value="ALL">Loading Countries...</option>
            </select>

            <input type="text" id="searchBox" placeholder="🔍 Search channels in selected country..." class="w-full p-2.5 mb-4 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:border-emerald-500 text-white">
            
            <div id="channelContainer" class="flex-1 overflow-y-auto space-y-2 pr-1">
                <p class="text-center text-slate-500 animate-pulse mt-10">Fetching 5000+ Channels...</p>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const nowPlaying = document.getElementById('nowPlaying');
        const container = document.getElementById('channelContainer');
        const searchBox = document.getElementById('searchBox');
        const countrySelect = document.getElementById('countrySelect');
        
        let allChannels = [];
        let hls = null;

        // 🔗 গুরুত্বপূর্ণ: আপনার Cloudflare Worker ডেপ্লয় করার পর যে লিংকটি পেয়েছেন, সেটি নিচে বসান।
        // উদাহরণ: 'https://your-worker-name.workers.dev'
        const API_URL = 'https://tv.psinfo.workers.dev'; 

        // ব্যাকএন্ড ওয়ার্কার থেকে চ্যানেল ডেটা লোড করা
        async function loadChannels() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                allChannels = data.channels;
                
                // দেশগুলোর লিস্ট ড্রপডাউনে সেট করা
                setupCountryDropdown();
                
                // প্রথমে সব চ্যানেল স্ক্রিনে দেখানো
                displayChannels(allChannels);
            } catch (err) {
                container.innerHTML = `<p class="text-center text-red-400">Failed to load channels. Please check your Worker URL in index.html.</p>`;
            }
        }

        // ড্রপডাউন মেনু তৈরি
        function setupCountryDropdown() {
            const countries = [...new Set(allChannels.map(ch => ch.category))].sort();
            
            countrySelect.innerHTML = '<option value="ALL">🌍 All Countries (Show All)</option>';
            countries.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.innerText = country;
                countrySelect.appendChild(option);
            });
        }

        // স্ক্রিনে চ্যানেল কার্ড রেন্ডার করা
        function displayChannels(channels) {
            container.innerHTML = '';
            if(channels.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500">No channels found</p>`;
                return;
            }
            
            // সাইট যাতে ল্যাগ না করে, তাই একবারে প্রথম ৩০০টি চ্যানেল লোড করবে
            const limit = channels.slice(0, 300);
            
            limit.forEach(ch => {
                const card = document.createElement('div');
                card.className = "flex items-center gap-4 p-2 bg-slate-800/50 hover:bg-emerald-600/20 rounded-lg cursor-pointer transition border border-slate-800/80";
                card.innerHTML = `
                    <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50?text=TV'" class="w-12 h-12 rounded object-cover bg-white">
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-sm truncate">${ch.name}</p>
                        <p class="text-xs text-slate-400 truncate">📍 ${ch.category}</p>
                    </div>
                `;
                card.onclick = () => playStream(ch.url, ch.name);
                container.appendChild(card);
            });
        }

        // লাইভ ভিডিও স্ট্রিমিং প্লেয়ার লজিক (.m3u8 HLS প্লেয়ার)
        function playStream(url, name) {
            nowPlaying.innerText = `📺 Now Playing: ${name}`;
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                hls.on(Hls.Events.ERROR, (evt, data) => {
                    if (data.fatal) nowPlaying.innerText = `❌ Stream Dead/Offline: ${name}`;
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => video.play());
            }
        }

        // দেশ পরিবর্তন বা সার্চ করার ফিল্টারিং লজিক (ফিক্সড)
        function filterChannels() {
            const selectedCountry = countrySelect.value;
            const searchQuery = searchBox.value.toLowerCase();
            
            let filtered = allChannels;
            
            if (selectedCountry !== "ALL") {
                filtered = filtered.filter(ch => ch.category === selectedCountry);
            }
            
            if (searchQuery) {
                filtered = filtered.filter(ch => ch.name.toLowerCase().includes(searchQuery));
            }
            
            displayChannels(filtered);
        }

        // ইভেন্ট লিসেনার সেট করা
        countrySelect.addEventListener('change', filterChannels);
        searchBox.addEventListener('input', filterChannels);

        // অ্যাপ রান করা
        loadChannels();
    </script>
</body>
</html>
